name: Doctor Prescriptions CI

on:
  push:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: doctorPrescriptions/backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - uses: astral-sh/setup-uv@v3

      - run: uv sync
      - run: uv run ruff check .

  frontend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: doctorPrescriptions/frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install
      - run: npm run build  